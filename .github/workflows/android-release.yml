name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2026.02.01)"
        required: true
  push:
    tags:
      - "*"

concurrency:
  group: "release-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_VERSION_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Prepare Essentia Native Artifacts
        run: ./third_party/essentia/fetch_prebuilt_from_rn_essentia_static.sh

      - name: Validate signing secrets
        env:
          KEY_BASE64: ${{ secrets.KEY_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        run: |
          test -n "${KEY_BASE64}" || (echo "Missing secret: KEY_BASE64" && exit 1)
          test -n "${KEYSTORE_PASS}" || (echo "Missing secret: KEYSTORE_PASS" && exit 1)

      - name: Create signing files
        env:
          KEY_BASE64: ${{ secrets.KEY_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        run: |
          echo "${KEY_BASE64}" | base64 --decode > release.keystore
          cat > keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${KEYSTORE_PASS}
          keyAlias=release
          keyPassword=${KEYSTORE_PASS}
          EOF

      - name: Run Unit Tests
        run: ./gradlew :app:test

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        name: Create Release
        id: publish_release
        with:
          tag_name: ${{ env.APP_VERSION_TAG }}
          name: Release ${{ env.APP_VERSION_TAG }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          make_latest: true
          prerelease: false
          draft: true

      - name: Cleanup signing files
        if: always()
        run: rm -f release.keystore keystore.properties
