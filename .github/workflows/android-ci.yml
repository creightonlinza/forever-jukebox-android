name: Android CI

on:
  pull_request:
  push:
    branches:
      - "main"
    tags-ignore:
      - "*"

concurrency:
  group: "android-ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run Detekt
        run: ./gradlew :app:detekt
